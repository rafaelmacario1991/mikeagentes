{% extends "base.html" %}
{% block title %}{{ 'Editar' if professional else 'Novo' }} Profissional{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:center; gap:14px;">
  <a href="/professionals" style="color:var(--muted); display:flex; align-items:center; gap:6px; font-size:13px; text-decoration:none;">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Profissionais
  </a>
  <span style="color:var(--border);">/</span>
  <div class="page-title" style="margin:0;">{{ 'Editar profissional' if professional else 'Novo profissional' }}</div>
</div>

<div style="max-width:520px;">
  <div class="card">
    <form method="post" action="{{ '/professionals/' + professional.id + '/edit' if professional else '/professionals/new' }}">
      <div style="margin-bottom:18px;">
        <label class="field-label" for="name">Nome completo</label>
        <input class="input-field" type="text" id="name" name="name"
          placeholder="Ex: Carlos Silva" value="{{ professional.name if professional else '' }}" required autofocus>
      </div>
      <div style="margin-bottom:28px;">
        <label class="field-label" for="specialty">Especialidade</label>
        <input class="input-field" type="text" id="specialty" name="specialty"
          placeholder="Ex: Barbeiro, Cabeleireiro, Esteticista..."
          value="{{ professional.specialty if professional else '' }}">
      </div>
      <div style="display:flex; gap:10px;">
        <button type="submit" class="btn-primary">{{ 'Salvar alteracoes' if professional else 'Criar profissional' }}</button>
        <a href="/professionals" class="btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
