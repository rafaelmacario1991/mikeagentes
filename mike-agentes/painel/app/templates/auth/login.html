<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mike Agentes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #080d16;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .logo-wrap {
      display: flex; align-items: center; gap: 12px; margin-bottom: 36px;
    }
    .logo-icon {
      width: 40px; height: 40px; background: #3b82f6; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .logo-sub { font-size: 11px; color: #64748b; font-family: 'JetBrains Mono', monospace; }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin: 0 0 6px; letter-spacing: -0.02em; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #64748b; margin-bottom: 7px;
    }
    input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px; padding: 11px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; color: #e2e8f0; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%; background: #3b82f6; color: #fff; border: none;
      padding: 13px; border-radius: 9px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: opacity 0.15s; letter-spacing: 0.01em;
    }
    .btn:hover { opacity: 0.88; }
    .error-box {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; padding: 11px 14px; font-size: 13.5px; color: #fca5a5;
      margin-bottom: 20px;
    }
    .footer-text { text-align: center; margin-top: 28px; font-size: 12px; color: #334155; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
          <path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-4 4v-4z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Mike Agentes</div>
        <div class="logo-sub">painel de controle</div>
      </div>
    </div>

    <h1>Entrar</h1>
    <p class="subtitle">Acesse sua conta para gerenciar o agente.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>

    <div class="footer-text">MK AutoSolution © 2026</div>
  </div>
</body>
</html>
