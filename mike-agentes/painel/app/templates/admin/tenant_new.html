{% extends "base.html" %}
{% block title %}Novo Tenant{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:flex-start; justify-content:space-between;">
  <div>
    <div class="page-title">Novo Tenant</div>
    <div class="page-subtitle">Cria um novo cliente na plataforma com acesso ao painel.</div>
  </div>
  <a href="/admin/tenants" class="btn-ghost" style="text-decoration:none;">
    Voltar
  </a>
</div>

<div class="card" style="max-width:540px;">
  {% if error %}
  <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:13.5px; color:#fca5a5;">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/admin/tenants/new" style="display:flex; flex-direction:column; gap:18px;">

    <div>
      <label class="field-label">Nome do negocio</label>
      <input
        type="text"
        name="name"
        class="input-field"
        placeholder="Ex: Barbearia Silva"
        required
        autofocus
      >
    </div>

    <div>
      <label class="field-label">Email de acesso</label>
      <input
        type="email"
        name="email"
        class="input-field"
        placeholder="cliente@email.com"
        required
      >
      <div style="font-size:12px; color:var(--muted); margin-top:5px;">
        O cliente usará este email para fazer login no painel.
      </div>
    </div>

    <div>
      <label class="field-label">Senha inicial</label>
      <input
        type="password"
        name="password"
        class="input-field"
        placeholder="Minimo 6 caracteres"
        minlength="6"
        required
      >
    </div>

    <div>
      <label class="field-label">Plano</label>
      <select name="plan" class="input-field">
        <option value="starter">Starter — R$97/mes</option>
        <option value="pro">Pro — R$197/mes</option>
        <option value="agency">Agency — R$397/mes</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; padding-top:4px;">
      <button type="submit" class="btn-primary">
        Criar Tenant
      </button>
      <a href="/admin/tenants" class="btn-ghost" style="text-decoration:none;">
        Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
